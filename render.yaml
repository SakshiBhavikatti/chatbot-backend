services:
  - type: web
    name: chatbot-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0

      - key: SAP_CLIENT_ID
        sync: false

      - key: SAP_CLIENT_SECRET
        sync: false

      - key: AI_CORE_URL
        sync: false

      - key: AI_CORE_TOKEN
        sync: false